---
name: Dependency Review

on: # yamllint disable-line rule:truthy
  - pull_request

permissions:
  contents: read

jobs:
  dependency-review:
    # Dependency graph + dependency review need GitHub Advanced Security on
    # private repos; skip there so the check can't hard-fail. Runs again
    # automatically if the repo is ever made public.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # tag=v2.20.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.deps.dev:443
            api.github.com:443
            api.securityscorecards.dev:443
            github.com:443

      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # tag=v7.0.1

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # tag=v5.0.0
