---
# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
name: CodeQL

on: # yamllint disable-line rule:truthy
  merge_group:
    types:
      - checks_requested
  pull_request:
    # The branches here must be a subset of the ones in the push key
    branches:
      - develop
      - develop-prerelease
  push:
    # Dependabot-triggered push events have read-only access, but uploading code
    # scanning requires write access.
    branches-ignore:
      - dependabot/**
  schedule:
    - cron: 31 7 * * 2

permissions:
  actions: read
  contents: read

jobs:
  diagnostics:
    name: Run Diagnostics
    uses: felddy/reusable-workflows/.github/workflows/diagnostics.yml@76486c28caa391f5f9db4941fc555a20a6e084c8 # tag=v4.2.0
  analyze:
    name: Analyze
    # CodeQL result upload requires code scanning, which needs GitHub Advanced
    # Security on private repos; skip there. Runs again if the repo goes public.
    if: ${{ !github.event.repository.private }}
    needs:
      - diagnostics
    runs-on: ubuntu-latest
    permissions:
      # actions/checkout needs this to fetch code
      contents: read
      # required for all workflows
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Override automatic language detection by changing the below
        # list
        #
        # Supported options are actions, c-cpp, csharp, go,
        # java-kotlin, javascript-typescript, python, ruby, and swift.
        # In scope: workflows (actions), the content build tooling
        # (scripts/content/*.mjs), and scripts/tests/*.py. The upstream
        # image-source toolchain was removed with the root Dockerfile and the
        # vendored mcp-server/ bundle is gitignored, so neither is scanned.
        # Keep this list in step with the tracked sources: dropping a language
        # that develop has already analyzed leaves a stale code-scanning
        # configuration, which makes the "CodeQL" gate report
        # "configurations not found" on every PR.
        language:
          - actions
          - javascript-typescript
          - python
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript',
        # 'python', 'ruby' ] Learn more about CodeQL language support at
        # https://git.io/codeql-language-support

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # tag=v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.github.com:443
            *.githubapp.com:443
            *.githubusercontent.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # tag=v7.0.1

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # tag=v4.37.2
        with:
          languages: ${{ matrix.language }}

      # Autobuild attempts to build any compiled languages (C/C++, C#, or
      # Java). If this step fails, then you should remove it and run the build
      # manually (see below).
      - name: Autobuild
        uses: github/codeql-action/autobuild@e0647621c2984b5ed2f768cb892365bf2a616ad1 # tag=v4.37.2

      # ℹ️ Command-line programs to run using the OS shell. 📚
      # https://git.io/JvXDl

      # ✏️ If the Autobuild fails above, remove it and uncomment the following
      #    three lines and modify them (or add more) to build your code if your
      #    project uses a compiled language

      # - run: |
      #     make bootstrap
      #     make release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # tag=v4.37.2
