---
# Any ignore directives should be uncommented in downstream projects to disable
# Dependabot updates for the given dependency. Downstream projects will get
# these updates when the pull request(s) in the appropriate skeleton are merged
# and Lineage processes these changes.

version: 2

updates:
  # NOTE: docker (root Dockerfile), npm, pip, and uv ecosystems were removed
  # with the upstream image-build toolchain — this fork deploys the published
  # felddy image and has no root Node/Python project to bump.
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: daily
    labels:
      - "bot :robot:"
      - "dependencies :game_die:"
      - "docker :whale:"
    groups:
      docker-compose-all:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    labels:
      - "bot :robot:"
      - "dependencies :game_die:"
      - "github-actions :octocat:"
    groups:
      github-actions-all:
        applies-to: version-updates
        patterns:
          - "*"

  # Template foundation additions (claude_template_repo)
  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
    labels:
      - "bot :robot:"
      - "dependencies :game_die:"
      - "docker :whale:"
    # Pin the devcontainer base to its current LTS major (Node 24). Take digest
    # and minor/patch bumps automatically, but defer major-version jumps (e.g. to
    # the next LTS, or to a short-lived "Current" release) to manual review.
    ignore:
      - dependency-name: node
        update-types:
          - version-update:semver-major

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
    labels:
      - "bot :robot:"
      - "dependencies :game_die:"
