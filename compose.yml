---
services:
  foundry:
    image: ghcr.io/felddy/foundryvtt:release
    hostname: ${FOUNDRY_HOSTNAME:-my_foundry_host}
    
    # GPU Support - uncomment these lines to enable GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    
    volumes:
      - type: bind
        source: ${FOUNDRY_DATA_PATH:-./data}
        target: /data
    
    environment:
      # Credentials (from .env file)
      - FOUNDRY_PASSWORD=${FOUNDRY_PASSWORD}
      - FOUNDRY_USERNAME=${FOUNDRY_USERNAME}
      - FOUNDRY_ADMIN_KEY=${FOUNDRY_ADMIN_KEY:-atropos}
      - FOUNDRY_TELEMETRY=${FOUNDRY_TELEMETRY:-true}
      
      # Version & URLs
      - FOUNDRY_VERSION=${FOUNDRY_VERSION:-14.363}
      - FOUNDRY_RELEASE_URL=${FOUNDRY_RELEASE_URL}
      
      # Hostname Configuration
      - FOUNDRY_HOSTNAME=${FOUNDRY_HOSTNAME}
      - FOUNDRY_LOCAL_HOSTNAME=${FOUNDRY_LOCAL_HOSTNAME}
      
      # SSL/HTTPS (optional)
      - FOUNDRY_SSL_CERT=${FOUNDRY_SSL_CERT}
      - FOUNDRY_SSL_KEY=${FOUNDRY_SSL_KEY}
      - FOUNDRY_PROTOCOL=${FOUNDRY_PROTOCOL}
      
      # Container Optimization
      - CONTAINER_CACHE=${CONTAINER_CACHE:-/data/container_cache}
      - CONTAINER_CACHE_SIZE=${CONTAINER_CACHE_SIZE}
      - CONTAINER_VERBOSE=${CONTAINER_VERBOSE:-false}
      - CONTAINER_UMASK=${CONTAINER_UMASK}
    
    ports:
      - target: 30000
        published: ${FOUNDRY_PORT:-30000}
        protocol: tcp
        mode: host
  
  # Optional: ngrok service for remote access
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["ngrok"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTH_TOKEN}
    command:
      - "http"
      - "foundry:30000"
      - "--region=${NGROK_REGION:-us}"
    ports:
      - "4040:4040"
    depends_on:
      - foundry
  
  # Optional: bidirectional file sync service (Syncthing)
  # Syncthing only syncs changed blocks - no full rewrites of unchanged files
  syncthing:
    image: syncthing/syncthing:latest
    profiles: ["sync"]
    volumes:
      - ${FOUNDRY_DATA_PATH:-./data}:/var/syncthing/Sync
      - syncthing-config:/var/syncthing/config
      - ./sync/.stignore:/var/syncthing/Sync/.stignore:ro
    environment:
      - STGUIAPIKEY=${SYNCTHING_API_KEY}
      - STNORESTART=1
      - STGUIADDRESS=0.0.0.0:8384
    ports:
      - "8384:8384"    # Web UI
      - "22000:22000/tcp"   # Sync protocol (TCP)
      - "22000:22000/udp"   # Sync protocol (UDP)
      - "21027:21027/udp"   # Discovery
    restart: unless-stopped
    depends_on:
      - foundry

volumes:
  syncthing-config:
