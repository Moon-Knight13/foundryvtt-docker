---
services:
  foundry:
    image: ghcr.io/felddy/foundryvtt:release
    hostname: ${FOUNDRY_HOSTNAME:-my_foundry_host}
    
    #GPU Support - uncomment these lines to enable GPU
    # NOTE: the FoundryVTT server is headless Node.js and does not use the GPU;
    # rendering happens in each player's browser. Leave this commented out.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    
    volumes:
      - type: bind
        source: ${FOUNDRY_DATA_PATH:-${HOME}/.local/share/FoundryVTT}
        target: /data
    
    environment:
      # Credentials (from .env file)
      - FOUNDRY_PASSWORD=${FOUNDRY_PASSWORD}
      - FOUNDRY_USERNAME=${FOUNDRY_USERNAME}
      - FOUNDRY_ADMIN_KEY=${FOUNDRY_ADMIN_KEY:?FOUNDRY_ADMIN_KEY must be set in .env}
      - FOUNDRY_TELEMETRY=${FOUNDRY_TELEMETRY:-false}

      # Performance: compress static assets and websocket traffic
      # (maps to compressStatic/compressSocket in options.json, regenerated on each start)
      - FOUNDRY_MINIFY_STATIC_FILES=${FOUNDRY_MINIFY_STATIC_FILES:-true}
      - FOUNDRY_COMPRESS_WEBSOCKET=${FOUNDRY_COMPRESS_WEBSOCKET:-true}
      
      # Version & URLs
      - FOUNDRY_VERSION=${FOUNDRY_VERSION:-14.363}
      - FOUNDRY_RELEASE_URL=${FOUNDRY_RELEASE_URL:-}
      
      # Hostname Configuration
      - FOUNDRY_HOSTNAME=${FOUNDRY_HOSTNAME:-}
      - FOUNDRY_LOCAL_HOSTNAME=${FOUNDRY_LOCAL_HOSTNAME:-}
      - FOUNDRY_PROXY_PORT=${FOUNDRY_PROXY_PORT:-}
      
      # SSL/HTTPS (optional)
      - FOUNDRY_SSL_CERT=${FOUNDRY_SSL_CERT:-}
      - FOUNDRY_SSL_KEY=${FOUNDRY_SSL_KEY:-}
      - FOUNDRY_PROTOCOL=${FOUNDRY_PROTOCOL:-}
      
      # Container Optimization
      - CONTAINER_CACHE=${CONTAINER_CACHE:-/data/container_cache}
      - CONTAINER_CACHE_SIZE=${CONTAINER_CACHE_SIZE:-}
      # CONTAINER_VERBOSE is intentionally NOT listed here: the image enables
      # debug logging (including an environment dump) whenever the variable is
      # set — even to "false" or empty. To debug, add it in a
      # compose.override.yml: environment: ["CONTAINER_VERBOSE=true"]
      - CONTAINER_UMASK=${CONTAINER_UMASK:-}
    
    ports:
      - target: 30000
        published: ${FOUNDRY_PORT:-30000}
        protocol: tcp
        mode: host
  
  # Remote access: Cloudflare Tunnel — no inbound ports, TLS at the edge.
  # The cloudflared service lives in the compose.cloudflare.yml overlay:
  #   docker compose -f compose.yml -f compose.cloudflare.yml up -d
  # See DEPLOYMENT.md ("Remote access via Cloudflare Tunnel").

  # Optional: monitoring stack - start with: docker compose --profile monitoring up -d
  # Netdata: per-container CPU/memory/network/disk graphs at http://localhost:19999
  netdata:
    image: netdata/netdata:stable
    profiles: ["monitoring"]
    ports:
      # operator-only dashboard (docker socket mounted) — keep off the LAN
      - "127.0.0.1:19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Dozzle: live container logs in the browser at http://localhost:8080
  dozzle:
    image: amir20/dozzle:latest
    profiles: ["monitoring"]
    ports:
      # serves all container logs unauthenticated — keep off the LAN
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
